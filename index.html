<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isak Pertiwi - Premiere Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg-black: #000000;
            --pure-white: #ffffff;
            --input-bg: rgba(20, 20, 20, 0.95);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-black); 
            color: var(--pure-white);
            min-height: 100vh;
            position: relative;
        }

        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: 
                radial-gradient(at 0% 0%, hsla(0,0%,25%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(0,0%,20%,1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(0,0%,15%,1) 0, transparent 50%);
        }

        .glass-panel {
            background: rgba(12, 12, 12, 0.98);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        .input-field {
            background: var(--input-bg) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: #ffffff !important;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: #ffffff !important;
            background: #000 !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn-monochrome {
            background: #ffffff;
            color: #000000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .btn-monochrome:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        .btn-monochrome:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .label-pop {
            color: #ffffff;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.15em;
            font-size: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,1);
        }

        .header-glow {
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }

        .poster-container {
            width: 100%;
            background: #000;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .poster-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Fixed Star Rating System - Left to Right */
        .stars-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .star-item {
            font-size: 42px;
            cursor: pointer;
            color: #222;
            transition: all 0.2s;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .star-item.active {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 min-h-screen">

    <div class="mesh-bg"></div>

    <div id="app" class="max-w-md w-full mx-auto py-8">
        
        <!-- STAGE 1: ENTRANCE REGISTRATION -->
        <div id="view-registration" class="animate-fade">
            <div class="text-center mb-8">
                <p class="text-[11px] uppercase tracking-[0.7em] text-white font-black mb-2">Registration and Feedback</p>
                <h1 class="text-5xl font-black tracking-tighter text-white uppercase italic header-glow">Isak Pertiwi</h1>
                <p class="text-white text-[11px] mt-3 tracking-widest font-black bg-white/20 inline-block px-5 py-2 rounded-full border border-white/20">BUANA PRODUCTION • XII A GROUP 1</p>
            </div>

            <div class="glass-panel rounded-[2.5rem] shadow-2xl overflow-hidden">
                <div class="poster-container">
                    <img src="https://i.ibb.co.com/MDnySQ3s/poster-isak-pertiwi-2.png" alt="poster-isak-pertiwi-2" border="0"></a>
                </div>

                <div class="form-content p-8">
                    <form id="regForm" class="space-y-6">
                        <div class="space-y-2">
                            <label class="label-pop block ml-1">Full Name</label>
                            <input type="text" id="name" required class="input-field w-full px-5 py-4 rounded-2xl outline-none" placeholder="Enter Full Name">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="label-pop block ml-1">Class</label>
                                <select id="class" required class="input-field w-full px-5 py-4 rounded-2xl outline-none appearance-none">
                                    <option value="" disabled selected>-</option>
                                    <optgroup label="Grade X">
                                        <option>XA</option><option>XB</option><option>XC</option><option>XD</option><option>XE</option><option>XF</option><option>XG</option>
                                    </optgroup>
                                    <optgroup label="Grade XI">
                                        <option>XIA</option><option>XIB</option><option>XIC</option><option>XID</option><option>XIE</option><option>XIF</option><option>XIG</option>
                                    </optgroup>
                                    <optgroup label="Grade XII">
                                        <option>XIIA</option><option>XIIB</option><option>XIIC</option><option>XIID</option><option>XIIE</option><option>XIIF</option><option>XIIG</option>
                                    </optgroup>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="label-pop block ml-1">WhatsApp</label>
                                <input type="tel" id="whatsapp" required class="input-field w-full px-5 py-4 rounded-2xl outline-none" placeholder="08...">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="label-pop block ml-1">Email Address</label>
                            <input type="email" id="email" required class="input-field w-full px-5 py-4 rounded-2xl outline-none" placeholder="your@email.com">
                        </div>

                        <button type="submit" id="btn-reg" class="btn-monochrome w-full py-5 rounded-2xl text-sm mt-4 font-black">
                            Verify Entry
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- STAGE 2: FEEDBACK FORM -->
        <div id="view-feedback" class="hidden animate-fade">
            <div class="glass-panel p-10 rounded-[2.5rem] shadow-2xl">
                <div class="text-center mb-8">
                    <h2 class="text-4xl font-black text-white uppercase italic header-glow">Review</h2>
                    <div class="h-1.5 w-20 bg-white mx-auto mt-2 rounded-full shadow-[0_0_10px_rgba(255,255,255,0.5)]"></div>
                </div>

                <div class="stars-container" id="stars-row">
                    <span class="star-item" data-value="1">★</span>
                    <span class="star-item" data-value="2">★</span>
                    <span class="star-item" data-value="3">★</span>
                    <span class="star-item" data-value="4">★</span>
                    <span class="star-item" data-value="5">★</span>
                </div>

                <form id="feedbackForm" class="space-y-6">
                    <div class="space-y-2">
                        <label class="label-pop block ml-1">Strength</label>
                        <textarea id="strength" required class="input-field w-full px-5 py-4 rounded-2xl h-28 outline-none resize-none" placeholder="What worked well?"></textarea>
                    </div>

                    <div class="space-y-2">
                        <label class="label-pop block ml-1">Weakness</label>
                        <textarea id="weakness" required class="input-field w-full px-5 py-4 rounded-2xl h-28 outline-none resize-none" placeholder="Areas for improvement?"></textarea>
                    </div>

                    <div class="space-y-2">
                        <label class="label-pop block ml-1">Advice / Opinion</label>
                        <textarea id="opinion" required class="input-field w-full px-5 py-4 rounded-2xl h-28 outline-none resize-none" placeholder="Message to the crew..."></textarea>
                    </div>

                    <button type="submit" id="btn-submit" class="btn-monochrome w-full py-5 rounded-2xl text-sm font-black">
                        Submit Review
                    </button>
                </form>
            </div>
        </div>

        <!-- STAGE 3: SUCCESS -->
        <div id="view-success" class="hidden text-center space-y-12 py-20 animate-fade">
            <div class="w-32 h-32 border-4 border-white rounded-full flex items-center justify-center mx-auto shadow-[0_0_40px_rgba(255,255,255,0.5)]">
                <i data-lucide="check" class="text-white" size="64" stroke-width="4"></i>
            </div>
            <div class="space-y-4">
                <h2 class="text-5xl font-black text-white uppercase italic header-glow">Success</h2>
                <p class="text-white text-base font-bold tracking-[0.2em] leading-relaxed max-w-xs mx-auto">BUANA PRODUCTION THANKS YOU FOR YOUR FEEDBACK.</p>
            </div>
            <button onclick="location.reload()" class="text-xs text-white uppercase tracking-[0.5em] font-black border-b-2 border-white/40 hover:border-white transition-all pt-2 pb-1">
                Exit Gate
            </button>
        </div>

    </div>

    <script>
        // 1. PLACE YOUR WEB APP URL HERE
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwItB1jOee21mpGm0rONpeABF3Y1Z4J39GFHdrlUa1bKrDcq_B3lgE3detYIqTd-a_L/exec"; 
        
        let sessionData = {};
        let currentRating = 0;

        window.onload = () => { lucide.createIcons(); };

        // Handle Star Selection Logic (Left to Right)
        const starItems = document.querySelectorAll('.star-item');
        starItems.forEach(star => {
            star.addEventListener('click', () => {
                currentRating = parseInt(star.getAttribute('data-value'));
                updateStars(currentRating);
            });
        });

        function updateStars(val) {
            starItems.forEach(star => {
                const starVal = parseInt(star.getAttribute('data-value'));
                if (starVal <= val) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        function showView(id) {
            ['view-registration', 'view-feedback', 'view-success'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // POST Data helper using URLSearchParams for better Google Script compatibility
        async function sendToGoogle(data) {
            if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("https://script.google.com/macros/s/AKfycbwItB1jOee21mpGm0rONpeABF3Y1Z4J39GFHdrlUa1bKrDcq_B3lgE3detYIqTd-a_L/exec")) return;
            
            try {
                // We use form-data style for widest compatibility with default GAS setups
                const params = new URLSearchParams();
                for (const key in data) {
                    params.append(key, data[key]);
                }

                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
            } catch (err) {
                console.error("Connection Error:", err);
            }
        }

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-reg');
            
            sessionData = {
                phase: 'RESERVE',
                name: document.getElementById('name').value.trim(),
                class: document.getElementById('class').value,
                whatsapp: document.getElementById('whatsapp').value.trim(),
                email: document.getElementById('email').value.trim()
            };

            btn.disabled = true;
            btn.innerText = "CONNECTING GATE...";

            await sendToGoogle(sessionData);
            showView('view-feedback');
        });

        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (currentRating === 0) {
                alert("Please select a star rating.");
                return;
            }

            const btn = document.getElementById('btn-submit');
            const payload = {
                phase: 'FEEDBACK',
                ...sessionData,
                rating: currentRating,
                strength: document.getElementById('strength').value.trim(),
                weakness: document.getElementById('weakness').value.trim(),
                opinion: document.getElementById('opinion').value.trim()
            };

            btn.disabled = true;
            btn.innerText = "FINALIZING REVIEW...";

            await sendToGoogle(payload);
            showView('view-success');
        });
    </script>
</body>
</html>
