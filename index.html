<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isak Pertiwi - Premiere Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg-black: #000000;
            --pure-white: #ffffff;
            --text-high: #ffffff;
            --text-med: #e5e7eb;
            --text-label: #9ca3af;
            --glass-white: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(0, 0, 0, 0.9);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-black); 
            color: var(--text-high);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Mesh Background Effect */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #000000;
            background-image: 
                radial-gradient(at 0% 0%, hsla(0,0%,20%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(0,0%,15%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(0,0%,20%,1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(0,0%,10%,1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(0,0%,15%,1) 0, transparent 50%);
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .input-field {
            background: var(--input-bg) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-field:focus {
            border-color: white !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
            background: #000 !important;
        }

        .btn-monochrome {
            background: var(--pure-white);
            color: var(--bg-black);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 800;
            text-shadow: none;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .btn-monochrome:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            filter: brightness(1.1);
        }

        .header-title {
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 12px;
        }
        .star-rating input { display: none; }
        .star-rating label {
            cursor: pointer;
            font-size: 36px;
            color: #444;
            transition: all 0.2s;
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: white;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        .poster-container {
            width: 100%;
            max-height: 420px;
            overflow: hidden;
            border-radius: 1.5rem 1.5rem 0 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .form-content {
            padding: 2.5rem 2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="mesh-bg"></div>

    <div id="app" class="max-w-md w-full mx-auto py-12">
        
        <!-- STAGE 1: ENTRANCE REGISTRATION -->
        <div id="view-registration" class="animate-fade">
            <div class="text-center mb-10">
                <p class="text-[10px] uppercase tracking-[0.6em] text-white font-extrabold mb-3">Buana Production</p>
                <h1 class="text-5xl font-black tracking-tighter text-white uppercase italic header-title">Isak Pertiwi</h1>
                <p class="text-gray-300 text-[11px] mt-2 tracking-widest font-bold">XII A GROUP 1 • PREMIERE GATE</p>
            </div>

            <div class="glass-panel rounded-[2rem] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.9)] overflow-hidden">
                <!-- Poster inside the box -->
                <div class="poster-container">
                    <img src="https://api.screenshotmachine.com/?key=ca8281&url=https%3A%2F%2Fraw.githubusercontent.com%2Fben-t-dev%2Fassets%2Fmain%2Fisak_poster.png&dimension=1024x768" 
                         alt="Isak Pertiwi" 
                         class="w-full h-full object-cover grayscale brightness-110 hover:grayscale-0 transition-all duration-700">
                </div>

                <div class="form-content">
                    <form id="regForm" class="space-y-5">
                        <div class="space-y-1.5">
                            <label class="text-[11px] uppercase tracking-[0.2em] text-white font-extrabold ml-1">Full Name</label>
                            <input type="text" id="name" required class="input-field w-full px-5 py-4 rounded-xl outline-none" placeholder="Enter Full Name">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1.5">
                                <label class="text-[11px] uppercase tracking-[0.2em] text-white font-extrabold ml-1">Class</label>
                                <select id="class" required class="input-field w-full px-5 py-4 rounded-xl outline-none appearance-none">
                                    <option value="" disabled selected>-</option>
                                    <optgroup label="Grade X">
                                        <option>XA</option><option>XB</option><option>XC</option><option>XD</option><option>XE</option><option>XF</option><option>XG</option>
                                    </optgroup>
                                    <optgroup label="Grade XI">
                                        <option>XIA</option><option>XIB</option><option>XIC</option><option>XID</option><option>XIE</option><option>XIF</option><option>XIG</option>
                                    </optgroup>
                                    <optgroup label="Grade XII">
                                        <option>XIIA</option><option>XIIB</option><option>XIIC</option><option>XIID</option><option>XIIE</option><option>XIIF</option><option>XIIG</option>
                                    </optgroup>
                                </select>
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-[11px] uppercase tracking-[0.2em] text-white font-extrabold ml-1">WhatsApp</label>
                                <input type="tel" id="whatsapp" required class="input-field w-full px-5 py-4 rounded-xl outline-none" placeholder="08...">
                            </div>
                        </div>

                        <div class="space-y-1.5">
                            <label class="text-[11px] uppercase tracking-[0.2em] text-white font-extrabold ml-1">Email</label>
                            <input type="email" id="email" required class="input-field w-full px-5 py-4 rounded-xl outline-none" placeholder="your@email.com">
                        </div>

                        <button type="submit" id="btn-reg" class="btn-monochrome w-full py-5 rounded-xl text-xs mt-4 tracking-[0.4em] uppercase">
                            Verify Entry
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- STAGE 2: FEEDBACK FORM -->
        <div id="view-feedback" class="hidden animate-fade">
            <div class="glass-panel p-10 rounded-[2.5rem] shadow-2xl">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-black text-white uppercase tracking-tighter italic header-title">Film Review</h2>
                    <div class="h-1 w-12 bg-white mx-auto mt-2"></div>
                </div>

                <form id="feedbackForm" class="space-y-6">
                    <div class="star-rating mb-4">
                        <input type="radio" id="s5" name="rating" value="5" required/><label for="s5">★</label>
                        <input type="radio" id="s4" name="rating" value="4"/><label for="s4">★</label>
                        <input type="radio" id="s3" name="rating" value="3"/><label for="s3">★</label>
                        <input type="radio" id="s2" name="rating" value="2"/><label for="s2">★</label>
                        <input type="radio" id="s1" name="rating" value="1"/><label for="s1">★</label>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[11px] uppercase tracking-widest text-white font-extrabold ml-1">Strength</label>
                        <textarea id="strength" required class="input-field w-full px-5 py-4 rounded-xl h-24 outline-none resize-none text-sm" placeholder="What was effective?"></textarea>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[11px] uppercase tracking-widest text-white font-extrabold ml-1">Weakness</label>
                        <textarea id="weakness" required class="input-field w-full px-5 py-4 rounded-xl h-24 outline-none resize-none text-sm" placeholder="Areas for growth?"></textarea>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[11px] uppercase tracking-widest text-white font-extrabold ml-1">Advice</label>
                        <textarea id="opinion" required class="input-field w-full px-5 py-4 rounded-xl h-24 outline-none resize-none text-sm" placeholder="Your notes to the production team..."></textarea>
                    </div>

                    <button type="submit" id="btn-submit" class="btn-monochrome w-full py-5 rounded-xl text-xs tracking-[0.4em] uppercase">
                        Confirm Submission
                    </button>
                </form>
            </div>
        </div>

        <!-- STAGE 3: SUCCESS -->
        <div id="view-success" class="hidden text-center space-y-10 py-20 animate-fade">
            <div class="w-24 h-24 border-2 border-white rounded-full flex items-center justify-center mx-auto shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                <i data-lucide="check" class="text-white" size="40"></i>
            </div>
            <div class="space-y-3">
                <h2 class="text-5xl font-black text-white tracking-tighter uppercase italic header-title">Success</h2>
                <p class="text-white text-[13px] font-bold tracking-widest leading-loose">BUANA PRODUCTION THANKS YOU FOR YOUR VALUABLE FEEDBACK.</p>
            </div>
            <button onclick="location.reload()" class="text-[11px] text-white/60 uppercase tracking-[0.5em] font-extrabold hover:text-white transition-colors pt-10">
                Exit Portal
            </button>
        </div>

    </div>

    <script>
        const GOOGLE_SCRIPT_URL = ""; // YOUR APPS SCRIPT URL HERE
        
        let sessionData = {};

        window.onload = () => { lucide.createIcons(); };

        function showView(id) {
            ['view-registration', 'view-feedback', 'view-success'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-reg');
            
            sessionData = {
                phase: 'RESERVE',
                name: document.getElementById('name').value.trim(),
                class: document.getElementById('class').value,
                whatsapp: document.getElementById('whatsapp').value.trim(),
                email: document.getElementById('email').value.trim()
            };

            btn.disabled = true;
            btn.innerText = "VERIFYING...";

            if (GOOGLE_SCRIPT_URL) {
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(sessionData)
                    });
                } catch (err) { console.error("Sync Error", err); }
            }

            showView('view-feedback');
        });

        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');

            const payload = {
                phase: 'FEEDBACK',
                ...sessionData,
                rating: document.querySelector('input[name="rating"]:checked').value,
                strength: document.getElementById('strength').value.trim(),
                weakness: document.getElementById('weakness').value.trim(),
                opinion: document.getElementById('opinion').value.trim()
            };

            btn.disabled = true;
            btn.innerText = "SUBMITTING...";

            if (GOOGLE_SCRIPT_URL) {
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                } catch (err) { console.error("Sync Error", err); }
            }

            showView('view-success');
        });
    </script>
</body>
</html>
